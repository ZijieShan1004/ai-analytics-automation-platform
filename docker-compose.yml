services:
  postgres:
    image: postgres:16
    container_name: analytics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-analytics_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - analytics_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analytics_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: analytics_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - analytics_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: analytics_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./ml:/app/ml
      - analytics_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "cd /app/backend &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: analytics_worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./ml:/app/ml
      - analytics_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "cd /app/backend &&
             celery -A app.tasks.celery_app.celery_app worker --loglevel=info"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: analytics_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - analytics_frontend_node_modules:/app/node_modules
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0

volumes:
  analytics_postgres_data:
  analytics_redis_data:
  analytics_uploads:
  analytics_frontend_node_modules: